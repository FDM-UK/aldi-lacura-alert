<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
        }

        body {
            background-color: #fdf6f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: white;
            padding: 3rem;
            border-radius: 16px;
            max-width: 480px;
            width: 90%;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }

        h1 {
            color: #c4687a;
            font-size: 2.2rem;
            margin-bottom: 1rem;
            font-weight: 600;
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }

        p {
            color: #666;
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        input {
            width: 100%;
            padding: 0.9rem;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            margin-bottom: 1rem;
        }

        button {
            width: 100%;
            padding: 0.9rem;
            background-color: #c4687a;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
        }

        button:hover {
            background-color: #a85666;
        }

        .small-print {
            font-size: 0.75rem;
            color: #999;
            margin-top: 1rem;
            margin-bottom: 0;
        }

    </style>
    <title>Aldi Lacura Special Buy Alerts</title>
</head>
<body>
    <div class="container">
        <h1>Lacura Alerts</h1>
        <p>Get notified when Lacura beauty products appear in Aldi Special Buys. Free alerts, straight to your inbox.</p>
        <form action="https://lacuraalerts.co.uk/subscribe" method="POST">
            <input type="email" name="email" placeholder="Enter your email" required>
            <button type="submit">Subscribe</button>
            <p class="small-print">We'll only email you when Lacura appears in Aldi Special Buys. Unsubscribe any time.</p>
        </form>
        
    </form>

    <div style="margin-top: 2rem; padding-top: 2rem; border-top: 1px solid #f0e6e6;">
        <p class="small-print">If you find this useful...</p>
        <script type='text/javascript' src='https://storage.ko-fi.com/cdn/widget/Widget_2.js'></script>
        <script type='text/javascript'>kofiwidget2.init('Buy me a Coffee', '#c4687a', 'Q5Q01XHCKV');kofiwidget2.draw();</script>
    </div>

</div>

    </div>
<script>
    const SUPABASE_URL = 'https://ielciasxntzieyounvhj.supabase.co'
    const SUPABASE_KEY = 'sb_publishable_pb5Z5bWkU71L5hgyBMgcLQ_LAVtNNfY'

    function generateToken() {
        return Math.random().toString(36).substr(2) +
               Math.random().toString(36).substr(2) +
               Math.random().toString(36).substr(2)
    }

    document.querySelector('form').addEventListener('submit', async function (e) {
        e.preventDefault()

        const email = document.querySelector('input[name="email"]').value
        const token = generateToken()

        const response = await fetch(`${SUPABASE_URL}/rest/v1/subscribers`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'apikey': SUPABASE_KEY,
                'Authorization': `Bearer ${SUPABASE_KEY}`
            },
            body: JSON.stringify({ 
                email: email,
                confirmed: false,
                is_donor: false,
                token: token
            })
        })

        if (response.ok) {
            document.querySelector('.container').innerHTML = '<h1>Thank you!</h1><p>Please check your email to confirm your subscription.</p>'
        } else {
            alert('Something went wrong. Please try again.')
        }
    })
</script>
</body>
</html>
